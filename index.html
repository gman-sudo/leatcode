<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Demo Coding Streak Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      background: #0f1117;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 50px 20px;
    }

    .container {
      width: 100%;
      max-width: 1000px;
    }

    .banner {
      background: #2f2500;
      color: #ffd666;
      border: 1px solid #6b5600;
      padding: 14px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 35px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 24px;
    }

    .card-title {
      color: #8b949e;
      font-size: 14px;
      margin-bottom: 14px;
    }

    .number {
      font-size: 40px;
      font-weight: 700;
      color: #ffa116;
    }

    .subtext {
      color: #8b949e;
      margin-top: 8px;
      font-size: 13px;
    }

    .calendar-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 30px;
    }

    .calendar-title {
      font-size: 22px;
      margin-bottom: 25px;
    }

    .months {
      display: flex;
      gap: 44px;
      color: #8b949e;
      font-size: 12px;
      margin-bottom: 10px;
      padding-left: 30px;
    }

    .calendar-wrapper {
      display: flex;
      gap: 12px;
    }

    .days {
      display: flex;
      flex-direction: column;
      gap: 5px;
      color: #8b949e;
      font-size: 11px;
      margin-top: 22px;
    }

    .days span {
      height: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(53, 16px);
      grid-template-rows: repeat(7, 16px);
      gap: 4px;
    }

    .cell {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      background: #21262d;
      cursor: pointer;
      transition: transform 0.15s ease;
      position: relative;
    }

    .cell:hover {
      transform: scale(1.2);
    }

    .l1 {
      background: #0e4429;
    }

    .l2 {
      background: #006d32;
    }

    .l3 {
      background: #26a641;
    }

    .l4 {
      background: #39d353;
    }

    .legend {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
      color: #8b949e;
      font-size: 12px;
    }

    .legend-box {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      background: #21262d;
    }

    .tooltip {
      position: fixed;
      background: #1f2937;
      color: white;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 999;
      border: 1px solid #374151;
    }

    @media (max-width: 850px) {
      .stats {
        grid-template-columns: 1fr;
      }

      .calendar-card {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>

<div class="container">



  <div class="stats">

    <div class="card">
      <div class="card-title">Current Streak</div>
      <div class="number">42 🔥</div>
      <div class="subtext">days</div>
    </div>

    <div class="card">
      <div class="card-title">Longest Streak</div>
      <div class="number">68</div>
      <div class="subtext">days</div>
    </div>

    <div class="card">
      <div class="card-title">Total Problems Solved</div>
      <div class="number">247</div>
      <div class="subtext">demo submissions</div>
    </div>

  </div>

  <div class="calendar-card">

    <div class="calendar-title">
      Submission Activity
    </div>

    <div class="months">
      <span>Jan</span>
      <span>Feb</span>
      <span>Mar</span>
      <span>Apr</span>
      <span>May</span>
      <span>Jun</span>
      <span>Jul</span>
      <span>Aug</span>
      <span>Sep</span>
      <span>Oct</span>
      <span>Nov</span>
      <span>Dec</span>
    </div>

    <div class="calendar-wrapper">

      <div class="days">
        <span>Mon</span>
        <span></span>
        <span>Wed</span>
        <span></span>
        <span>Fri</span>
        <span></span>
        <span></span>
      </div>

      <div class="grid" id="grid"></div>

    </div>

    <div class="legend">
      Less
      <div class="legend-box"></div>
      <div class="legend-box l1"></div>
      <div class="legend-box l2"></div>
      <div class="legend-box l3"></div>
      <div class="legend-box l4"></div>
      More
    </div>

  </div>

</div>

<div class="tooltip" id="tooltip"></div>

<script>
  const grid = document.getElementById("grid");
  const tooltip = document.getElementById("tooltip");

  const levels = [
    { cls: "", count: 0 },
    { cls: "l1", count: 1 },
    { cls: "l2", count: 2 },
    { cls: "l3", count: 4 },
    { cls: "l4", count: 7 }
  ];

  for (let i = 0; i < 371; i++) {
    const cell = document.createElement("div");
    cell.classList.add("cell");

    const r = Math.random();
    let level;

    if (r < 0.45) level = levels[0];
    else if (r < 0.68) level = levels[1];
    else if (r < 0.83) level = levels[2];
    else if (r < 0.95) level = levels[3];
    else level = levels[4];

    if (level.cls) {
      cell.classList.add(level.cls);
    }

    const daysAgo = 370 - i;
    const date = new Date();
    date.setDate(date.getDate() - daysAgo);

    const text =
      level.count +
      " problem" +
      (level.count !== 1 ? "s" : "") +
      " solved on " +
      date.toDateString();

    cell.addEventListener("mousemove", (e) => {
      tooltip.style.display = "block";
      tooltip.style.left = e.pageX + 15 + "px";
      tooltip.style.top = e.pageY - 10 + "px";
      tooltip.textContent = text;
    });

    cell.addEventListener("mouseleave", () => {
      tooltip.style.display = "none";
    });

    grid.appendChild(cell);
  }
</script>

</body>
</html>
